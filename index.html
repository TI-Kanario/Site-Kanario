<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Kanario</title>

<style>
:root{
  --bg:#0b0c10;
  --text:#f2f4f8;
  --muted:#aab2c0;
  --line:rgba(255,255,255,.08);
  --radius:26px;
}

*{box-sizing:border-box}
html,body{height:100%}

body{
  margin:0;
  font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  color:var(--text);
  background:
    radial-gradient(1000px 600px at 25% -10%, rgba(244,180,0,.12), transparent 60%),
    radial-gradient(1000px 600px at 80% 0%, rgba(255,42,42,.10), transparent 55%),
    radial-gradient(800px 500px at 50% 120%, rgba(255,255,255,.05), transparent 60%),
    var(--bg);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:32px 20px;
}

.card{
  width:min(1000px,100%);
  border-radius:var(--radius);
  background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
  border:1px solid var(--line);
  box-shadow:0 30px 90px rgba(0,0,0,.55);
  overflow:hidden;
  backdrop-filter: blur(18px);
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:28px 32px;
  border-bottom:1px solid var(--line);
}

.brand{
  display:flex;
  align-items:center;
  gap:18px;
}

.mark{
  width:140px;
  height:140px;
  border-radius:22px;
  background:rgba(255,255,255,.10); /* mais claro */
  border:1px solid rgba(255,255,255,.25);
  display:flex;
  align-items:center;
  justify-content:center;
  backdrop-filter: blur(6px);
}

.mark img{
  width:92%;
  height:92%;
  object-fit:contain;
}

.brandtext strong{
  font-size:18px;
  letter-spacing:-.3px;
}

.brandtext span{
  display:block;
  font-size:12px;
  color:var(--muted);
  margin-top:4px;
}

.links{
  display:flex;
  gap:12px;
}

.links a{
  text-decoration:none;
  font-size:12px;
  color:var(--muted);
  padding:8px 12px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.04);
  transition:.2s ease;
}

.links a:hover{
  color:var(--text);
  background:rgba(255,255,255,.08);
}

main{
  padding:90px 20px 110px;
  text-align:center;
  position:relative;
}

.glow{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:420px;
  height:420px;
  background:
    radial-gradient(circle at 35% 35%, rgba(244,180,0,.35), transparent 60%),
    radial-gradient(circle at 65% 65%, rgba(255,42,42,.30), transparent 60%);
  filter:blur(90px);
  opacity:.85;
  z-index:0;
}

main h1{
  position:relative;
  z-index:1;
  font-size:46px;
  letter-spacing:-1px;
  margin:0;
}

.tagline{
  position:relative;
  z-index:1;
  margin-top:14px;
  font-size:15px;
  color:var(--muted);
}

footer{
  border-top:1px solid var(--line);
  padding:22px 32px;
  font-size:12px;
  color:var(--muted);
}

@media (max-width:700px){
  header{
    flex-direction:column;
    align-items:flex-start;
    gap:18px;
  }
  .glow{
    width:300px;
    height:300px;
  }
  main h1{
    font-size:36px;
  }
}
</style>
</head>

<body>

<div class="card">

  <header>
    <div class="brand">
      <div class="mark">
        <img src="assets/kanario-logo.png" alt="Kanario">
      </div>
      <div class="brandtext">
        
      </div>
    </div>

    <div class="links">
      <a href="assets/kanario-logo.png" target="_blank">PNG</a>
      <a href="assets/kanario-logo.svg" target="_blank">SVG</a>
    </div>
  </header>

  <main>
    <div class="glow"></div>
    <h1>Kanario</h1>
    <div class="tagline">Estrutura e organização.</div>
  </main>

  <footer>
    © <span id="year"></span> Kanario
  </footer>

</div>

<script>
document.getElementById("year").textContent = new Date().getFullYear();
</script>

</body>
</html>
